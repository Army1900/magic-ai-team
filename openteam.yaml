version: "1.0"
ui:
  theme: dracula
  color: true
current_provider: openai
providers:
  openai:
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    models:
      default: gpt-5-mini
      planner: gpt-5
      optimizer: gpt-5-mini
      exporter_mapper: gpt-5-mini
  anthropic:
    base_url: https://api.anthropic.com
    api_key_env: ANTHROPIC_API_KEY
    models:
      default: claude-sonnet-4
      planner: claude-sonnet-4
      optimizer: claude-sonnet-4
      exporter_mapper: claude-sonnet-4
marketplaces:
  - id: official
    kind: official
    url: https://registry.openteam.dev
    enabled: true
  - id: github-community
    kind: github
    url: https://github.com/topics/openteam-skill
    enabled: false
  - id: private-hub
    kind: private
    url: https://registry.example.internal
    enabled: true
resolution_policy:
  source_priority:
    - private
    - official
    - github
    - ai-generated
  allow_ai_generated: true
  min_trust_score: 0.7
launchers:
  continue:
    run:
      mode: manual
      manual_hint: "Set args_template to enable --run for continue."
